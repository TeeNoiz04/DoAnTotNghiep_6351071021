<div class="card mb-0 mt-1 border-none">
  <div class="card-body p-0">
    <div class="form-details">
      <div class="form-details" [ngSwitch]="importMode">
        <ng-container *ngSwitchDefault>
          <!-- Import Information -->
          <div class="card card-enhanced mb-0 border-card">
            <div
              (click)="toggleCardCollapse('importInformation')"
              class="card-header d-flex justify-content-between align-items-center">
              <h5 class="mb-0 d-flex align-items-center">
                <i class="bi bi-info-circle me-2"></i>
                Import Information
              </h5>
              <div class="card-actions">
                <button class="btn btn-sm btn-icon" type="button">
                  <i
                    class="bi"
                    [ngClass]="isCardCollapsed['importInformation'] ? 'bi-chevron-down' : 'bi-chevron-up'"></i>
                </button>
              </div>
            </div>
            <div class="card-body p-0" [ngbCollapse]="isCardCollapsed['importInformation']">
              <div class="card mb-0 card-custom border-none">
                <div class="card-body-custom">
                  <form *ngIf="useServiceData && importInfoForm" [formGroup]="importInfoForm" class="form-container">
                    <fieldset [disabled]="true">
                      <div class="row mb-1">
                        <div class="col-md-12">
                          <div>
                            <label class="form-label" for="note">Note</label>
                            <textarea id="note" class="form-control" formControlName="note" rows="3"></textarea>
                          </div>
                        </div>
                      </div>
                    </fieldset>
                  </form>
                </div>
              </div>
            </div>
          </div>

          <!-- Material Items Table -->
          <div class="card card-enhanced mb-0 border-card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <h5 class="mb-0 d-flex align-items-center">
                <i class="bi bi-table me-2"></i>
                Material Items
              </h5>
            </div>
            <div class="card-body">
              <div *ngIf="isLoading" class="card-loading-overlay">
                <div class="spinner-border text-primary"></div>
              </div>

              <!-- Warning alert giống style màu đỏ bên dưới -->
              <div *ngIf="hasWarnings" class="alert alert-warning mb-1 p-1">
                <h5 class="alert-heading">
                  <i class="bi bi-exclamation-triangle-fill me-2"></i>
                  Warnings Found
                </h5>
                <p class="mb-0">
                  There are {{ warningMessages.length }} {{ warningMessages.length > 1 ? 'rows' : 'row' }} with
                  materials not found in the system.
                </p>
              </div>

              <app-material-items [resultImport]="resultImport" [importMode]="importMode" />
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</div>
