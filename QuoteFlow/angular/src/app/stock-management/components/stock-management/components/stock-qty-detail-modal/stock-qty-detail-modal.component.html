<abp-modal
  appEscCloseModal
  [(visible)]="visible"
  [suppressUnsavedChangesWarning]="true"
  [options]="{
    size: 'xl',
    animation: true,
    centered: true,
    backdrop: 'static',
    keyboard: false,
  }"
  [busy]="loading"
  (disappear)="closeModal()">
  <ng-template #abpHeader>
    <h4 class="d-flex align-items-center">
      <i class="bi bi-lock-fill me-2 text-warning"></i>
      Material Stock Detail
    </h4>
  </ng-template>

  <ng-template #abpBody>
    <div *ngIf="loading" class="text-center mb-3">
      <div class="spinner-border spinner-border-sm text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <span class="ms-2">Loading stock qty...</span>
    </div>

    <div class="content">
      <!-- Lock Stock Table -->
      <div class="mb-1">
        <div class="card-body p-0">
          <!-- Detail Section -->
          <app-advanced-data-table
            *ngIf="!tableLoading"
            [data]="stockQtyData"
            [height]="'auto'"
            [showGroupHeaders]="true"
            [showSummary]="false"
            [enableSelection]="false"
            (cellClick)="onCellClick($event)">
            <app-table-column-group name="Stock Qty Information" cssClass="group-header stock-qty-group">
              <!-- Stock Code Column -->
              <app-table-column field="stockCode" header="Stock Code" width="200px" textAlign="start">
              </app-table-column>

              <!-- Stock Name Column -->
              <app-table-column field="stockName" header="Stock Name" width="200px" textAlign="start">
              </app-table-column>

              <!-- Stock Qty Column -->
              <app-table-column
                field="qty"
                header="Stock Qty"
                width="200px"
                textAlign="end"
                componentType="clickCell"
                cellClickAction="viewStockHistory"
                [formatter]="formatQuantity">
              </app-table-column>

              <!-- Available Qty Column -->
              <app-table-column field="availableStock" header="Available Qty" width="200px" textAlign="end">
              </app-table-column>

              <!-- Created Date Column -->
              <app-table-column
                field="created"
                header="Created"
                width="150px"
                textAlign="center"
                [formatter]="formatModifiedDate">
              </app-table-column>

              <!-- Created By Column -->
              <app-table-column
                field="createdBy"
                header="Created By"
                width="120px"
                textAlign="center"
                [formatter]="formatUsername">
              </app-table-column>
            </app-table-column-group>
          </app-advanced-data-table>
        </div>
      </div>
    </div>
  </ng-template>

  <ng-template #abpFooter> </ng-template>
</abp-modal>

<!-- Stock History Detail Modal -->
<app-stock-history-detail-modal
  *ngIf="showStockHistoryModal"
  [(visible)]="showStockHistoryModal"
  [materialItem]="materialItem"
  [stockCode]="selectedStockCode"
  [golfaCode]="materialItem?.golfaCode">
</app-stock-history-detail-modal>
