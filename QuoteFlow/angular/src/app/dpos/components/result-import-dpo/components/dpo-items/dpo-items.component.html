<div *ngIf="dpoDetailsValidation">
  <app-advanced-data-table
    [data]="data"
    [height]="height"
    [showGroupHeaders]="false"
    [showSummary]="false"
    [enableErrorHandling]="true"
    [errorField]="'errors'"
    [hasErrorsField]="'hasErrors'"
    [rowIndexField]="'rowIndex'"
    (rowClick)="onRowClick($event)">
    <!-- Item Information Group -->
    <app-table-column-group name="Item Information" cssClass="group-header item-group">
      <!-- Status Column -->
      <app-table-column
        field="rowData.status"
        header=""
        width="80px"
        textAlign="center"
        [fixed]="true"
        componentType="status">
      </app-table-column>

      <!-- Row Number Column -->
      <app-table-column
        field="rowData.rowNo"
        header="No."
        width="40px"
        textAlign="center"
        [fixed]="true"
        [formatter]="formatNumber">
      </app-table-column>

      <!-- Material Code Column -->
      <app-table-column field="rowData.golfaCode" header="Material Code" width="120px" [fixed]="true">
      </app-table-column>

      <!-- Model Column -->
      <app-table-column field="rowData.model" header="Model" width="150px" [fixed]="true"> </app-table-column>

      <!-- SPO Code Column -->
      <app-table-column field="rowData.spoCode" header="SPO Code" width="120px"> </app-table-column>
    </app-table-column-group>

    <!-- Pricing Information Group -->
    <app-table-column-group name="Pricing Information" cssClass="group-header price-group">
      <!-- Quantity Column -->
      <app-table-column field="rowData.qty" header="Quantity" width="80px" textAlign="end" [formatter]="formatNumber">
      </app-table-column>

      <!-- Unit Price Column -->
      <app-table-column
        field="rowData.unitPrice"
        header="Unit Price"
        width="130px"
        textAlign="end"
        [formatter]="formatCurrency">
      </app-table-column>

      <!-- Amount Column -->
      <app-table-column
        field="rowData.amount"
        header="Amount"
        width="130px"
        textAlign="end"
        [formatter]="formatCurrency">
      </app-table-column>
    </app-table-column-group>

    <!-- Customer Information Group -->
    <app-table-column-group name="Customer Information" cssClass="group-header customer-group">
      <!-- Requested ETA Column -->
      <app-table-column field="rowData.requestedETA" header="Requested ETA" width="120px" [formatter]="formatDate">
      </app-table-column>

      <!-- Customer Name Column -->
      <app-table-column field="rowData.customerName" header="Customer Name" width="230px" [showEllipsis]="true">
      </app-table-column>

      <!-- Customer Tax Code Column -->
      <app-table-column field="rowData.customerTaxCode" header="Customer Tax Code" width="150px"> </app-table-column>

      <!-- Customer Type Column-->
      <app-table-column field="rowData.customerType" header="Customer Type" width="110px"> </app-table-column>

      <!-- Note Column -->
      <app-table-column field="rowData.note" header="Note" width="200px"> </app-table-column>
    </app-table-column-group>

    <!--Extra column group-->
    <app-table-column-group name="Extra Information" cssClass="group-header extra-group">
      <!-- Spec 1 Column -->
      <app-table-column field="rowData.spec1" header="Spec 1" width="120px"> </app-table-column>

      <!-- Spec 2 Column -->
      <app-table-column field="rowData.spec2" header="Spec 2" width="120px"> </app-table-column>
    </app-table-column-group>
  </app-advanced-data-table>
</div>

<div *ngIf="!dpoDetailsValidation" class="alert alert-info">No DPO items data available.</div>
