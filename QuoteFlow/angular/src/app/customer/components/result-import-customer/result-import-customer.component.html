<div class="card mb-0 mt-1 border-none">
  <div class="card-body p-0">
    <div class="form-details">
      <div class="form-details">
        <!-- Customer Items Table Section -->
        <div class="card card-enhanced mb-0 border-card">
          <div
            (click)="toggleCardCollapse('customerItems')"
            class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0 d-flex align-items-center">
              <i class="bi bi-people me-2"></i>
              Customer Items
              <span *ngIf="resultImport?.listData?.length" class="ms-2 badge bg-info">
                {{ resultImport?.listData?.length }} items
              </span>
            </h5>
            <div class="card-actions">
              <button class="btn btn-sm btn-icon" type="button">
                <i class="bi" [ngClass]="isCardCollapsed['customerItems'] ? 'bi-chevron-down' : 'bi-chevron-up'"></i>
              </button>
            </div>
          </div>
          <div class="card-body" [ngbCollapse]="isCardCollapsed['customerItems']">
            <div *ngIf="isLoading" class="card-loading-overlay">
              <div class="spinner-border text-primary"></div>
            </div>
            <app-customer-items [resultImport]="resultImport" [height]="height" />
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
