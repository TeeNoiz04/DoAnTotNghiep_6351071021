<app-advanced-data-table
  [data]="data"
  [height]="height"
  [showGroupHeaders]="true"
  [showSummary]="false"
  [enableErrorHandling]="true"
  [errorField]="'errors'"
  [hasErrorsField]="'hasErrors'"
  [rowIndexField]="'rowIndex'"
  [enableClientSidePagination]="true"
  [pageSize]="100"
  [showPageSizeSelector]="true"
  [pageSizeOptions]="[50, 100, 200, 300]"
  [showItemsInfo]="true"
  [paginationPosition]="'bottom'"
  (rowClick)="onRowClick($event)">
  <!-- Stock Tracing Detail Group -->
  <app-table-column-group name="Stock Tracing Detail" cssClass="group-header item-group">
    <!-- Row No Column -->
    <app-table-column field="rowData.rowNo" header="No." width="40px" />

    <!-- Delivery Mode specific columns -->
    <app-table-column *ngIf="isDeliveryMode" field="rowData.checkListCode" header="Check List Code" width="120px">
    </app-table-column>

    <app-table-column
      *ngIf="isDeliveryMode"
      field="rowData.dateEntered"
      header="Date Entered"
      width="180px"
      [formatter]="formatDateTime">
    </app-table-column>

    <!-- Inventory Mode specific columns -->
    <app-table-column *ngIf="isInventoryMode" field="rowData.wareHouse" header="Warehouse" width="180px">
    </app-table-column>

    <app-table-column *ngIf="isInventoryMode" field="rowData.bUs" header="BUs" width="180px" />

    <!-- Receipt Mode specific columns -->
    <app-table-column *ngIf="isReceiptMode" field="rowData.packingListCode" header="Packing List Code" width="180px">
    </app-table-column>

    <app-table-column
      *ngIf="isReceiptMode"
      field="rowData.dateEntered"
      header="Date Entered"
      width="180px"
      [formatter]="formatDateTime">
    </app-table-column>

    <!-- Common columns for all modes -->
    <app-table-column field="rowData.stock" header="Stock" width="180px" />

    <app-table-column field="rowData.bu" header="BU" width="180px" />

    <app-table-column field="rowData.customer" header="Customer" width="180px" [showEllipsis]="true" />

    <app-table-column field="rowData.category" header="Category" width="180px" />

    <app-table-column *ngIf="isDeliveryMode" field="rowData.giv" header="GIV" width="180px" />

    <app-table-column *ngIf="isDeliveryMode" field="rowData.invoice" header="Invoice" width="180px" />

    <app-table-column field="rowData.skuCode" header="SKU Code" width="180px" />

    <app-table-column field="rowData.skuName" header="SKU Name" width="80px" />

    <app-table-column field="rowData.quality" header="Quality" width="80px" />

    <app-table-column field="rowData.warranty" header="Warranty" width="80px" />

    <app-table-column field="rowData.unit" header="Unit" width="80px" />

    <app-table-column field="rowData.series" header="Series" width="180px" />

    <app-table-column field="rowData.golfaCode" header="Material Code" width="180px" />

    <app-table-column field="rowData.originCode" header="Origin Code" width="180px" />

    <app-table-column *ngIf="isInventoryMode" field="rowData.orginCode" header="Origin Code" width="180px">
    </app-table-column>

    <app-table-column field="rowData.productionDate" header="Production Date" width="180px" [formatter]="formatDate" />

    <app-table-column *ngIf="!isInventoryMode" field="rowData.location" header="Location" width="180px">
    </app-table-column>

    <app-table-column *ngIf="isReceiptMode" field="rowData.qty" header="Qty" width="180px" />

    <app-table-column field="rowData.note" header="Note" width="180px" />
  </app-table-column-group>
</app-advanced-data-table>
