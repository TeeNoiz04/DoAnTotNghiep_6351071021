        <ng-container *ngSwitchDefault>
          <div class="card card-enhanced mb-0 border-card">
            <div
              (click)="toggleCardCollapse('importInformation')"
              class="card-header d-flex justify-content-between align-items-center">
              <h5 class="mb-0 d-flex align-items-center">
                <i class="bi bi-info-circle me-2"></i>
                Import Information
              </h5>
              <div class="card-actions">
                <button class="btn btn-sm btn-icon" type="button">
                  <i
                    class="bi"
                    [ngClass]="isCardCollapsed['importInformation'] ? 'bi-chevron-down' : 'bi-chevron-up'"></i>
                </button>
              </div>
            </div>
            <div class="card-body p-0" [ngbCollapse]="isCardCollapsed['importInformation']">
              <div class="card mb-0 card-custom">
                <div class="card-body-custom">
                  <form *ngIf="useServiceData && importInfoForm" [formGroup]="importInfoForm" class="form-container">
                    <fieldset [disabled]="true">
                      <div class="row mb-1" *ngIf="!isInventory">
                        <div class="col-md-3">
                          <div>
                            <label class="form-label" for="fromDate">From Date</label>
                            <input autocomplete="off" id="fromDate" class="form-control" formControlName="fromDate" />
                          </div>
                        </div>
                        <div class="col-md-3">
                          <div>
                            <label class="form-label" for="toDate">To Date</label>
                            <input autocomplete="off" id="toDate" class="form-control" formControlName="toDate" />
                          </div>
                        </div>
                      </div>
                      <div class="row mb-1" *ngIf="isInventory">
                        <div class="col-md-3">
                          <div>
                            <label class="form-label" for="toDate">Date Entered</label>
                            <input autocomplete="off" id="toDate" class="form-control" formControlName="entered" />
                          </div>
                        </div>
                      </div>
                      <div class="row mb-1">
                        <div class="col-md-12">
                          <div>
                            <label class="form-label" for="note">Note</label>
                            <textarea id="note" class="form-control" formControlName="note" rows="3"></textarea>
                          </div>
                        </div>
                      </div>
                    </fieldset>
                  </form>
                </div>
              </div>
            </div>
          </div>
          <!-- Project Information Form Section -->

          <!-- Price Offer Details Table Section -->
          <div class="card card-enhanced mb-0 border-card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <h5 class="mb-0 d-flex align-items-center">
                <i class="bi bi-table me-2"></i>
                Stock Tracing Items
                <span class="ms-2 badge bg-info">
                  <!-- {{service?.priceOfferDetails?.items?.length || 0 }} items -->
                </span>
              </h5>
            </div>
            <div class="card-body">
              <div *ngIf="isLoading" class="card-loading-overlay">
                <div class="spinner-border text-primary"></div>
              </div>
              <app-stock-tracing-items [resultImport]="resultImport" [importMode]="importMode" />
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</div>
