<abp-page>
  <div class="page-content">
    <div class="card shadow sticky-header">
      <div class="header-content mx-3">
        <abp-page-title-container class="col-md-12 col-lg-auto content-header-container">
          <div class="content-header-body">
            <h1 class="subtext">{{ title }}</h1>
            <div class="content-header-content">
              <h1 class="content-header-title m-0">
                {{ service?.selected?.requestNo }}
              </h1>
              <app-status-label [status]="service?.selected?.status"></app-status-label>
            </div>
          </div>
        </abp-page-title-container>
        <abp-page-toolbar-container class="col-12 col-xl mt-xl-0">
          <div class="action-request text-end d-flex gap-2 justify-content-end">
            <button
              class="btn btn-secondary"
              type="button"
              (click)="goBack()"
              placement="bottom"
              ngbTooltip="Back"
              triggers="hover">
              <i class="bi bi-arrow-left-circle"></i>
              <span class="ms-1">Back</span>
            </button>
          </div>
        </abp-page-toolbar-container>
      </div>
    </div>

    <ng-container *ngIf="service?.form; else loadingTemplate">
      <div class="form-details">
        <app-expandable-panel-v2
          headerText="Batch Request Information"
          panelId="basic_info"
          [defaultCollapsed]="false"
          icon="bi bi-info-circle"
          [isDisabled]="false">
          <form [formGroup]="service?.form" class="form-details">
            <div class="row g-2">
              <div class="col-12 col-md-3">
                <div class="mb-0">
                  <label class="form-label" for="fileName">{{ '::File Name' | abpLocalization }}</label>
                  <input autocomplete="off" id="fileName" formControlName="fileName" readonly class="form-control" />
                </div>
              </div>
              <div class="col-12 col-md-3">
                <div class="mb-0">
                  <label class="form-label" for="requestNo">{{ '::Request No' | abpLocalization }}</label>
                  <input autocomplete="off" id="requestNo" formControlName="requestNo" readonly class="form-control" />
                </div>
              </div>
              <div class="col-12 col-md-3">
                <div class="mb-0">
                  <label class="form-label" for="importType">{{ '::Import Type' | abpLocalization }}</label>
                  <input
                    autocomplete="off"
                    id="importType"
                    formControlName="importType"
                    readonly
                    class="form-control" />
                </div>
              </div>
              <div class="col-12 col-sm-3">
                <label class="form-label">Status</label>
                <div class="form-control-plaintext">
                  <app-status-label [status]="service?.selected?.status"></app-status-label>
                </div>
              </div>
            </div>
          </form>
        </app-expandable-panel-v2>

        <app-expandable-panel-v2
          headerText="Batch Request Items"
          panelId="batch_request_items"
          [defaultCollapsed]="false"
          icon="bi bi-list-ul"
          [isDisabled]="false">
          <div class="mb-1 d-flex justify-content-between align-items-center">
            <!-- LEFT: SEARCH -->
            <div style="max-width: 400px; width: 100%">
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-search"></i>
                </span>

                <input
                  type="text"
                  class="form-control"
                  [ngbTooltip]="'Search by SPO Code, Material Code, or Note...'"
                  [(ngModel)]="searchTerm"
                  (keyup)="onSearch($event)"
                  [disabled]="service.isBusy" />

                <button
                  *ngIf="searchTerm"
                  class="btn btn-outline-secondary"
                  type="button"
                  (click)="clearSearch()"
                  title="Clear search">
                  <i class="bi bi-x-lg"></i>
                </button>
              </div>

              <small class="text-muted" *ngIf="searchTerm && filteredRows.length !== allRows.length">
                Found {{ filteredRows.length }} of {{ allRows.length }} items
              </small>
            </div>

            <!-- RIGHT: DELETE BUTTON -->
            <button
              class="btn btn-danger ms-3"
              type="button"
              (click)="onDeleteSelectedItems()"
              placement="bottom"
              ngbTooltip="Delete selected items"
              triggers="hover"
              [disabled]="!selectedItemIds.length">
              <i class="bi bi-trash me-1"></i>
              Delete ({{ selectedItemIds.length }})
            </button>
          </div>

          <ngx-datatable
            class="bootstrap custom-datatable"
            columnMode="force"
            [rowHeight]="'auto'"
            [rows]="pagedRows"
            [count]="filteredRows.length"
            [limit]="pageSize"
            [offset]="pageIndex"
            [footerHeight]="50"
            [scrollbarH]="true"
            [externalPaging]="true"
            (page)="onPage($event)">
            <!--  Checkbox column -->
            <ngx-datatable-column
              *ngIf="service?.selected?.status === 'IN_PROGRESS'"
              [width]="50"
              [maxWidth]="50"
              [sortable]="false"
              [canAutoResize]="false">
              <ng-template ngx-datatable-header-template>
                <div style="height: 24px; display: flex; align-items: center; justify-content: center">
                  <input
                    type="checkbox"
                    [checked]="isAllSelected"
                    [indeterminate]="isIndeterminate"
                    (change)="toggleSelectAll($event.target['checked'])" />
                </div>
              </ng-template>
              <ng-template ngx-datatable-cell-template let-row="row">
                <ng-container *ngIf="isItemDeletable(row); else disabledCheckbox">
                  <div style="height: 24px; display: flex; align-items: center; justify-content: center">
                    <input
                      type="checkbox"
                      [checked]="selectedItemIds.includes(row.id)"
                      (change)="toggleSelectItem(row.id, $event.target['checked'])" />
                  </div>
                </ng-container>
                <ng-template #disabledCheckbox>
                  <div style="height: 24px; display: flex; align-items: center; justify-content: center">
                    <input type="checkbox" disabled [title]="'This item has already been executed'" />
                  </div>
                </ng-template>
              </ng-template>
            </ngx-datatable-column>
            <!-- Dynamic columns -->
            <ngx-datatable-column
              *ngFor="let col of columns[service?.selected?.importType]"
              [prop]="col.prop"
              [name]="col.name"
              [sortable]="col.sortable"
              [minWidth]="col.minWidth"
              [frozenLeft]="col.frozenLeft"
              [cellClass]="col.frozenLeft ? 'frozen-cell' : ''">
              <ng-template ngx-datatable-cell-template let-row="row" let-value="value">
                <ng-container [ngSwitch]="col?.format">
                  <ng-container *ngSwitchCase="'status'">
                    <app-status-label [status]="value"></app-status-label>
                  </ng-container>
                  <ng-container *ngSwitchCase="'number'">
                    {{ value | number: '1.0-2' }}
                  </ng-container>
                  <ng-container *ngSwitchCase="'currency'">
                    {{ value | currency }}
                  </ng-container>
                  <ng-container *ngSwitchCase="'date'">
                    {{ value | date: 'dd/MM/yyyy' }}
                  </ng-container>
                  <ng-container *ngSwitchDefault>
                    {{ value }}
                  </ng-container>
                </ng-container>
              </ng-template>
            </ngx-datatable-column>
          </ngx-datatable>
        </app-expandable-panel-v2>
      </div>
    </ng-container>

    <ng-template #loadingTemplate>
      <div class="card mt-0 mb-0">
        <div class="card-body d-flex justify-content-center align-items-center p-5">
          <div class="text-center">
            <div class="spinner-border text-primary mb-3" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mb-0">Loading form data, please wait...</p>
          </div>
        </div>
      </div>
    </ng-template>
  </div>
</abp-page>
