<app-expandable-panel-v2
  headerText="Search With Filters"
  panelId="search_info"
  [defaultCollapsed]="false"
  icon="bi bi-search"
  [isDisabled]="false"
  class="mb-2">
  <div class="filter-area">
    <div *ngIf="searchForm">
      <form [formGroup]="searchForm!" (ngSubmit)="onSearch()" class="form-container">
        <div class="row-5-custom">
          <div class="col">
            <div>
              <label class="form-label" for="offerTypeFilter"> SPO Type </label>
              <ng-select
                name="offerTypeFilter"
                [items]="priceOfferTypeOptions"
                bindLabel="label"
                bindValue="value"
                clearable="true"
                appendTo="body"
                formControlName="priceOfferType">
              </ng-select>
            </div>
          </div>
          <div class="col">
            <div>
              <label class="form-label" for="projectNameFilter"> SPO Name <strong>(%)</strong> </label>
              <input
                appTrim
                autocomplete="off"
                id="projectNameFilter"
                class="form-control"
                formControlName="projectName" />
            </div>
          </div>
          <div class="col">
            <div>
              <label class="form-label" for="priceOfferCodeFilter"> SPO Code <strong>(%)</strong> </label>
              <input
                appTrim
                autocomplete="off"
                id="priceOfferCodeFilter"
                class="form-control"
                formControlName="priceOfferCode" />
            </div>
          </div>
          <div class="col">
            <div>
              <label class="form-label" for="buyerFilter"> Buyer </label>
              <ng-select
                name="buyerFilter"
                [items]="buyerOptions"
                bindLabel="displayCode"
                bindValue="id"
                appendTo="body"
                formControlName="buyerId">
              </ng-select>
            </div>
          </div>
          <div class="col">
            <div>
              <label class="form-label" for="approvalStatus"> Approval Status </label>
              <ng-select
                name="approvalStatus"
                [items]="statusOptions"
                bindLabel="label"
                bindValue="value"
                clearable="true"
                appendTo="body"
                formControlName="approvalStatus">
              </ng-select>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</app-expandable-panel-v2>
