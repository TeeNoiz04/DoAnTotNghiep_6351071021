<abp-page [title]="title | abpLocalization">
  <abp-page-toolbar-container class="col">
    <div class="text-lg-end actions">
      <!-- <button
        class="btn btn-primary btn-sm mx-2"
        type="button"
        [disabled]="service.isExportToExcelBusy"
        (click)="exportToExcel()">
        {{ '::ExportToExcel' | abpLocalization }}
      </button> -->

      <button
        *abpPermission="AppPermissions.MasterDatas.CreateBuyer"
        class="btn btn-primary"
        style="width: 115px"
        type="button"
        (click)="create()">
        <i class="fa fa-plus me-1" aria-hidden="true"></i>
        {{ '::AddNew' | abpLocalization }}
      </button>
    </div>
  </abp-page-toolbar-container>

  <!-- Filter section -->
  <div class="card mb-4">
    <!-- <div class="card-header">
      <h5 class="card-title mb-0">{{ '::Filters' | abpLocalization }}</h5>
    </div> -->
    <div class="card-body">
      @if (service.filters; as filters) {
        <form #filterForm (keyup.enter)="onLoad()">
          <div class="row">
            <div class="col-12 col-sm-6 col-md-8 col-lg-9">
              <label class="form-label" for="isDeactiveFilter">
                {{ '::Filters' | abpLocalization }}
              </label>
              <input
                appTrim
                autocomplete="off"
                type="text"
                class="form-control"
                [(ngModel)]="filters.filterText"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="onSearchTextChange($event)" />
            </div>
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
              <div class="mb-3">
                <label class="form-label" for="isDeactiveFilter">
                  {{ '::IsDeactive' | abpLocalization }}
                </label>

                <select
                  id="isDeactiveFilter"
                  class="form-select form-control"
                  [(ngModel)]="filters.deactive"
                  [ngModelOptions]="{ standalone: true }"
                  (change)="onLoad()">
                  <option [ngValue]="true">{{ '::Yes' | abpLocalization }}</option>
                  <option [ngValue]="false">{{ '::No' | abpLocalization }}</option>
                </select>
              </div>
            </div>
          </div>
        </form>
      }
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <ngx-datatable
        default
        [rows]="service.data.items"
        [count]="service.data.totalCount"
        [list]="list"
        class="bootstrap">
        @if (isActionButtonVisible) {
          <ngx-datatable-column [name]="" [maxWidth]="80" [width]="80" [sortable]="false">
            <ng-template let-row="row" let-i="rowIndex" ngx-datatable-cell-template>
              <div class="d-flex justify-content-center align-items-center gap-1">
                <button
                  *abpPermission="AppPermissions.MasterDatas.EditBuyer"
                  (click)="update(row)"
                  class="btn btn-link p-0">
                  <i
                    class="fa fa-edit text-muted icon-hover-edit"
                    placement="top"
                    container="body"
                    ngbTooltip="Edit"></i>
                </button>
                <button
                  (click)="delete(row)"
                  *abpPermission="AppPermissions.MasterDatas.DeleteBuyer"
                  class="btn btn-link p-0">
                  <i
                    class="fa fa-trash text-muted icon-hover-delete"
                    placement="top"
                    container="body"
                    ngbTooltip="Delete"></i>
                </button>
              </div>
            </ng-template>
          </ngx-datatable-column>
        }
        <ngx-datatable-column name="{{ '::BuyerCode' | abpLocalization }}" prop="code" [maxWidth]="150">
          <ng-template let-row="row" ngx-datatable-cell-template>
            {{ row.code }}
          </ng-template>
        </ngx-datatable-column>
        <ngx-datatable-column name="{{ '::Name' | abpLocalization }}" prop="name" [maxWidth]="200">
          <ng-template let-row="row" ngx-datatable-cell-template>
            {{ row.name }}
          </ng-template>
        </ngx-datatable-column>
        <ngx-datatable-column name="{{ '::Address' | abpLocalization }}" prop="address">
          <ng-template let-row="row" ngx-datatable-cell-template>
            {{ row.address }}
          </ng-template>
        </ngx-datatable-column>
        <ngx-datatable-column name="{{ '::ContactInfo' | abpLocalization }}" prop="contactInfo" [maxWidth]="200">
          <ng-template let-row="row" ngx-datatable-cell-template>
            {{ row.contactInfo }}
          </ng-template>
        </ngx-datatable-column>
        <ngx-datatable-column name="{{ '::GetPriceColumn' | abpLocalization }}" prop="priceColumn" [maxWidth]="150">
          <ng-template let-row="row" ngx-datatable-cell-template>
            {{ service.getPriceFromLabel(row.priceColumn) }}
          </ng-template>
        </ngx-datatable-column>
        <ngx-datatable-column name="{{ '::Note' | abpLocalization }}" prop="note">
          <ng-template let-row="row" ngx-datatable-cell-template>
            {{ row.note }}
          </ng-template>
        </ngx-datatable-column>
      </ngx-datatable>
    </div>
  </div>
</abp-page>

@defer (when serviceDetail.isVisible) {
  @if (serviceDetail.isVisible) {
    <app-buyer-category-detail-modal />
  }
}
