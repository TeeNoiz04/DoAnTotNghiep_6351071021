<abp-modal
  appEscCloseModal
  [suppressUnsavedChangesWarning]="true"
  [busy]="service.isBusy"
  [(visible)]="service.isVisible"
  [options]="{ size: 'lg', backdrop: 'static' }">
  <ng-template #abpHeader>
    <h3>
      {{ (service.selected ? '::Edit' : '::New') | abpLocalization }}
    </h3>
  </ng-template>

  <ng-template #abpBody>
    <form [formGroup]="service.form" id="system-category" (ngSubmit)="submitForm()" [validateOnSubmit]="true">
      <ul ngbNav #nav="ngbNav" class="mt-0">
        <li ngbNavItem>
          <ng-template ngbNavContent>
            <div class="row mt-2 fade-in-top">
              <div class="col-12 col-sm-12 col-md-6 col-lg-6 mb-2">
                <label class="form-label label-required" for="system-category-code">
                  {{ '::Code' | abpLocalization }}</label
                >
                <input
                  autocomplete="off"
                  id="system-category-code"
                  formControlName="supplierCode"
                  class="form-control"
                  maxlength="50" />
              </div>

              <div class="col-12 col-sm-12 col-md-6 col-lg-6 mb-2">
                <label class="form-label" for="sap-code">
                  {{ '::SAP Code' | abpLocalization }}
                </label>
                <input autocomplete="off" id="sapCode" formControlName="sapCode" class="form-control" maxlength="500" />
              </div>

              <div class="row">
                <div class="col-12 col-sm-12 col-md-12 col-lg-12 mb-2">
                  <div class="checklist-container">
                    <mat-slide-toggle id="isDeactive" formControlName="isDeactive"> Deactive </mat-slide-toggle>
                  </div>
                </div>
              </div>

              <div class="col-12 col-sm-12 col-md-6 col-lg-6 mb-2">
                <label class="form-label label-required" for="system-category-description">
                  {{ '::Short Name' | abpLocalization }}
                </label>
                <input
                  autocomplete="off"
                  id="shortName"
                  formControlName="shortName"
                  class="form-control"
                  maxlength="500" />
              </div>
              <div class="col-12 col-sm-12 col-md-6 col-lg-6 mb-2">
                <label class="form-label" for="taxCode">
                  {{ '::Tax Code' | abpLocalization }}
                </label>
                <input autocomplete="off" id="taxCode" formControlName="taxCode" class="form-control" maxlength="500" />
              </div>
              <div class="col-12 col-sm-12 col-md-12 col-lg-12 mb-2">
                <label class="form-label label-required" for="fullName">
                  {{ '::Full Name' | abpLocalization }}
                </label>
                <input
                  autocomplete="off"
                  id="fullName"
                  formControlName="fullName"
                  class="form-control"
                  maxlength="500" />
              </div>
              <div class="col-12 col-sm-12 col-md-12 col-lg-12 mb-2">
                <label class="form-label" for="address">
                  {{ '::Address' | abpLocalization }}
                </label>
                <input autocomplete="off" id="address" formControlName="address" class="form-control" maxlength="500" />
              </div>
              <!-- <div class="col-12 col-sm-12 col-md-12 col-lg-12 mb-2">
                <label class="form-label" for="ystem-category-note">
                  {{ '::Note' | abpLocalization }}
                </label>

                <textarea
                  id="ystem-category-note"
                  formControlName="note"
                  class="form-control"
                  maxlength="4000"
                  rows="4"></textarea>
              </div> -->

              <!-- <div *ngIf="!!service.selected" class="col-12 col-sm-12 col-md-12 col-lg-12 mb-2">
                <div class="checklist-container">
                  <mat-slide-toggle id="isDeactive" formControlName="isDeactive"> Deactive </mat-slide-toggle>
                </div>
              </div> -->
            </div>
          </ng-template>
        </li>
      </ul>
      <div [ngbNavOutlet]="nav"></div>
    </form>
  </ng-template>

  <ng-template #abpFooter>
    <button type="button" class="btn btn-secondary" abpClose>
      {{ '::Cancel' | abpLocalization }}
    </button>

    <abp-button iconClass="fa fa-check" buttonType="submit" formName="system-category">
      {{ '::Save' | abpLocalization }}
    </abp-button>
  </ng-template>
</abp-modal>
