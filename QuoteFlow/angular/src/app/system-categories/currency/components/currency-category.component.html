<abp-page [title]="title | abpLocalization">
  <abp-page-toolbar-container class="col">
    <div class="text-lg-end top-actions">
      <button
        type="button"
        class="btn btn-primary"
        (click)="onLoad()"
        placement="bottom"
        ngbTooltip="Search"
        triggers="hover">
        <i class="bi bi-search me-1"></i>
        <span>{{ '::Search' | abpLocalization }}</span>
      </button>
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="clearFilters()"
        placement="bottom"
        ngbTooltip="Clear"
        triggers="hover">
        <i class="bi bi-arrow-repeat me-1"></i>
        <span>{{ '::Clear' | abpLocalization }}</span>
      </button>
      <button
        *abpPermission="AppPermissions.MasterDatas.CreateCurrency"
        class="btn btn-primary"
        type="button"
        (click)="create()"
        placement="bottom"
        ngbTooltip="Add New"
        triggers="hover">
        <i class="fa fa-plus me-1" aria-hidden="true"></i>
        <span>{{ '::AddNew' | abpLocalization }}</span>
      </button>
    </div>
  </abp-page-toolbar-container>
  <div class="card mb-3">
    <div class="card-body">
      @if (service.filters; as filters) {
        <form #filterForm>
          <div class="row">
            <!-- <div class="col-12 col-sm-6 col-md-8 col-lg-9">
              <label class="form-label" for="filterText">
                {{ '::Filters' | abpLocalization }}
              </label>
              <input
               autocomplete="off"
                id="filterText"
                type="text"
                class="form-control"
                [(ngModel)]="filters.filterText"
                [ngModelOptions]="{ standalone: true }" />
            </div> -->
            <div class="col-12 col-sm-4 col-md-4 col-lg-4">
              <label class="form-label" for="codeFilter">
                {{ '::Code' | abpLocalization }}
              </label>
              <input
                appTrim
                autocomplete="off"
                id="codeFilter"
                type="text"
                class="form-control"
                [(ngModel)]="filters.code"
                [ngModelOptions]="{ standalone: true }" />
            </div>
            <div class="col-12 col-sm-4 col-md-4 col-lg-4">
              <label class="form-label" for="DescriptionFilter">
                {{ '::Description' | abpLocalization }}
              </label>
              <input
                appTrim
                autocomplete="off"
                id="DescriptionFilter"
                type="text"
                class="form-control"
                [(ngModel)]="filters.description"
                [ngModelOptions]="{ standalone: true }" />
            </div>

            <div class="col-12 col-sm-4 col-md-4 col-lg-4">
              <div class="mb-0">
                <label class="form-label" for="isDeactiveFilter">
                  {{ '::Deactive' | abpLocalization }}
                </label>

                <select
                  id="isDeactiveFilter"
                  class="form-select form-control"
                  [(ngModel)]="filters.isDeactive"
                  [ngModelOptions]="{ standalone: true }">
                  <option [ngValue]="true">{{ '::Yes' | abpLocalization }}</option>
                  <option [ngValue]="false">{{ '::No' | abpLocalization }}</option>
                </select>
              </div>
            </div>
          </div>
        </form>
      }
    </div>
  </div>
  <div class="card">
    <div class="card-body">
      <ngx-datatable
        default
        [rows]="service.data.items"
        [count]="service.data.totalCount"
        [list]="list"
        class="bootstrap">
        <ngx-datatable-column [name]="" [maxWidth]="80" [width]="80" [sortable]="false">
          <ng-template let-row="row" let-i="rowIndex" ngx-datatable-cell-template>
            <div class="d-flex justify-content-center align-items-center gap-1">
              <button
                *abpPermission="AppPermissions.MasterDatas.EditCurrency"
                (click)="update(row)"
                class="btn btn-link p-0">
                <i class="fa fa-edit text-muted icon-hover-edit" placement="top" container="body" ngbTooltip="Edit"></i>
              </button>
              <button
                (click)="delete(row)"
                *abpPermission="AppPermissions.MasterDatas.DeleteCurrency"
                class="btn btn-link p-0">
                <i
                  class="fa fa-trash text-muted icon-hover-delete"
                  placement="top"
                  container="body"
                  ngbTooltip="Delete"></i>
              </button>
            </div>
          </ng-template>
        </ngx-datatable-column>
        <ngx-datatable-column name="Code" [maxWidth]="200" prop="code" ellipsis="true">
          <ng-template let-row="row" ngx-datatable-cell-template>
            <div [title]="row.code">
              {{ row.code }}
            </div>
          </ng-template>
        </ngx-datatable-column>
        <ngx-datatable-column name="Description" [maxWidth]="250" prop="description" ellipsis="true">
          <ng-template let-row="row" ngx-datatable-cell-template>
            <div [title]="row.description">
              {{ row.description }}
            </div>
          </ng-template>
        </ngx-datatable-column>
        <ngx-datatable-column
          [maxWidth]="200"
          name="Value"
          prop="value"
          ellipsis="true"
          cellClass="text-right"
          headerClass="text-right">
          <ng-template let-row="row" ngx-datatable-cell-template>
            <div [title]="row.value">
              {{ row.value | number: '1.0-2' }}
            </div>
          </ng-template>
        </ngx-datatable-column>

        <ngx-datatable-column name="Note" prop="note">
          <ng-template let-row="row" ngx-datatable-cell-template>
            <div [title]="row.note">
              {{ row.note }}
            </div>
          </ng-template>
        </ngx-datatable-column>
        <ngx-datatable-column
          name="{{ '::Info' | abpLocalization }}"
          headerClass="text-center"
          [sortable]="false"
          [canAutoResize]="false">
          <ng-template let-row="row" ngx-datatable-cell-template>
            <app-audit-info-column
              [creationTime]="row.creationTime"
              [creatorName]="row.creatorName"
              [lastModificationTime]="row.lastModificationTime"
              [lastModifierName]="row.lastModifierName">
            </app-audit-info-column>
          </ng-template>
        </ngx-datatable-column>
      </ngx-datatable>
    </div>
  </div>
</abp-page>

@defer (when serviceDetail.isVisible) {
  @if (serviceDetail.isVisible) {
    <app-currency-category-detail-modal />
  }
}
