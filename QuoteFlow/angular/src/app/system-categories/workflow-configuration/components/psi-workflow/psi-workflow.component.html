<abp-page [title]="title | abpLocalization">
  <div class="card">
    <div class="card-body">
      <ngx-datatable
        default
        [rows]="service.data.items"
        [count]="service.data.totalCount"
        [list]="list"
        class="bootstrap">
        <ngx-datatable-column
          *abpPermission="AppPermissions.WorkflowConfigurations.Edit"
          [name]=""
          [maxWidth]="40"
          [width]="40"
          [sortable]="false">
          <ng-template let-row="row" let-i="rowIndex" ngx-datatable-cell-template>
            <div class="d-flex justify-content-center align-items-center gap-1">
              <button class="btn btn-link p-0" (click)="update(row)">
                <i class="fa fa-edit text-muted icon-hover-edit" placement="top" container="body" ngbTooltip="Edit"></i>
              </button>
            </div>
          </ng-template>
        </ngx-datatable-column>

        <ngx-datatable-column name="Level" prop="workflowLevel" ellipsis="true">
          <ng-template let-row="row" ngx-datatable-cell-template>
            {{ row.workflowLevel }}
          </ng-template>
        </ngx-datatable-column>

        <ngx-datatable-column name="Role" prop="workflowRole" ellipsis="true">
          <ng-template let-row="row" ngx-datatable-cell-template>
            {{ row.workflowRole }}
          </ng-template>
        </ngx-datatable-column>

        <ngx-datatable-column name="Approvers" prop="approvers">
          <ng-template let-row="row" ngx-datatable-cell-template>
            {{ row.approvers }}
          </ng-template>
        </ngx-datatable-column>

        <ngx-datatable-column name="Condition" prop="condition" ellipsis="true">
          <ng-template let-row="row" ngx-datatable-cell-template>
            {{ row.condition }}
          </ng-template>
        </ngx-datatable-column>

        <ngx-datatable-column name="Note" prop="note">
          <ng-template let-row="row" ngx-datatable-cell-template>
            {{ row.note }}
          </ng-template>
        </ngx-datatable-column>
      </ngx-datatable>
    </div>
  </div>
</abp-page>

@defer (when serviceDetail.isVisible) {
  @if (serviceDetail.isVisible) {
    <app-workflow-configuration-detail-modal />
  }
}
