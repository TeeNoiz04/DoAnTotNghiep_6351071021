<form [formGroup]="service.sapInfoForm" class="sale-form-container">
  <div class="row mt-0 mb-1">
    <div class="col-12 col-md-3">
      <label class="form-label" for="sosapNo"> SAP SO No </label>
      <input autocomplete="off" id="sosapNo" class="form-control" formControlName="sosapNo" />
    </div>
    <div class="col-12 col-md-3">
      <label class="form-label" for="sapBillingNo"> SAP Billing No </label>
      <input autocomplete="off" id="sapBillingNo" class="form-control" formControlName="sapBillingNo" />
    </div>
    <div class="col-12 col-md-3">
      <label class="form-label" for="sapdoNo"> SAP DO No </label>
      <input autocomplete="off" id="sapdoNo" class="form-control" formControlName="sapdoNo" />
    </div>
    <div class="col-12 col-md-3">
      <label class="form-label" for="sapInvoice"> SAP Invoice No </label>
      <input autocomplete="off" id="sapInvoice" class="form-control" formControlName="sapInvoice" />
    </div>
  </div>
  <div class="row mt-0 mb-1">
    <div class="col-12 col-md-3">
      <label class="form-label" for="invoiceDate">SAP Invoice Date</label>
      <div class="input-group">
        <input
          autocomplete="off"
          id="invoiceDate"
          class="form-control"
          name="invoiceDate"
          #invoiceDateInput="ngbDatepicker"
          ngbDatepicker
          format="dd/MM/yyyy"
          formControlName="sapInvoiceDate"
          (click)="invoiceDateInput.toggle()"
          container="body" />
        <button class="btn btn-light bi bi-calendar3" (click)="invoiceDateInput?.toggle()" type="button"></button>
      </div>
    </div>
  </div>
</form>
