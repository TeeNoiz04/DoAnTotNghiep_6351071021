<abp-modal
  [suppressUnsavedChangesWarning]="true"
  [(visible)]="isVisible"
  [busy]="isBusy"
  [options]="{
    centered: true,
    backdrop: 'static',
    keyboard: true,
    fullscreen: true,
    windowClass: 'modal-fullscreen',
  }"
  (disappear)="closeDialog()">
  <ng-template #abpHeader>
    <h3>Add from DPO</h3>
  </ng-template>

  <ng-template #abpBody>
    <div class="row mb-2 mt-2">
      <div class="col-md-6">
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-search"></i>
          </span>

          <input
            autocomplete="off"
            type="text"
            class="form-control"
            [(ngModel)]="searchText"
            (ngModelChange)="onSearchChange()"
            placeholder="Search by DPO No, Material Code, Model or Note" />
        </div>
      </div>
    </div>

    <!-- Loading State -->
    <div *ngIf="isBusy" class="card">
      <div class="card-body d-flex justify-content-center align-items-center p-5">
        <div class="text-center">
          <div class="spinner-border text-primary mb-3" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="mb-0">Loading available data...</p>
          <!-- <p class="text-muted">Please wait while we fetch the data.</p> -->
        </div>
      </div>
    </div>

    <!-- No Data State -->
    <div *ngIf="!isBusy && (!filteredData || filteredData.length === 0)" class="card">
      <div class="card-body d-flex justify-content-center align-items-center p-5">
        <div class="text-center">
          <i class="bi bi-inbox fs-1 text-muted"></i>
          <p class="mt-3 mb-0">No data found</p>
        </div>
      </div>
    </div>

    <div *ngIf="!isBusy && filteredData && filteredData.length > 0" class="card">
      <div class="card-body p-0">
        <app-data-table
          [allowCheckToEditRow]="true"
          [hasClickRow]="false"
          [showAllCheckbox]="true"
          [showCheckbox]="true"
          [selectionType]="'multi'"
          [itemEdit]="false"
          [itemRemove]="false"
          [allRecords]="selectedAllData || []"
          [records]="filteredData || []"
          [isActivePaging]="true"
          [pageSize]="pageSize"
          [totalCount]="totalCount"
          (changedPaging)="onChangedPaging($event)"
          (itemSelectChange)="onItemSelectChange($event)"
          (checkboxChange)="onSelectionChange($event)"
          (checkboxCheckedFalse)="onSelectionCheckedFalse($event)"
          (changeValueCellItemHandler)="onChangeValueCellItem($event)">
          <app-header title="" name="checkbox" [className]="'w-5'"></app-header>
          <app-header title="DPO No" name="dpoNo" [className]="'w-5'"></app-header>
          <app-header title="Material Code" name="golfaCode" [className]="'w-5'"></app-header>
          <app-header title="Model" name="model" [className]="'w-5'"></app-header>
          <app-header title="VAT" name="vat" [className]="'w-5'"></app-header>
          <app-header title="Lock Stock" name="lockStock" [className]="'w-5'"></app-header>
          <app-header title="DPO Extra fee" name="extrafee" [className]="'w-5'"></app-header>
          <app-header title="DPO Extra fee Note" name="extrafee_Note" [className]="'w-5'"></app-header>
          <app-header title="SO Extra fee" name="extrafeeUsedInSO" [className]="'w-5'"></app-header>
          <app-header title="Note" name="note" [className]="'w-50'"></app-header>
          <app-header title="DPO Confirm Note" name="confirmedNote" [className]="'w-5'"></app-header>

          <app-column value="checkbox" columnType="checkbox"></app-column>
          <app-column value="dpoNo"></app-column>
          <app-column value="golfaCode"></app-column>
          <app-column value="model"></app-column>
          <app-column value="vat" [formatter]="formatPercentVat"></app-column>
          <app-column value="qty" columnType="int" [className]="'text-end'"></app-column>
          <app-column value="extrafee" columnType="int"> </app-column>
          <app-column value="extrafee_Note" columnType="ellipsis"></app-column>
          <app-column value="extrafeeSO" type="text" typeEdit="textbox" typeControl="price"></app-column>
          <app-column value="note" type="text" typeEdit="textbox" typeControl="note"></app-column>
          <app-column value="confirmedNote" columnType="ellipsis"></app-column>
        </app-data-table>
      </div>
    </div>
  </ng-template>

  <ng-template #abpFooter>
    <div class="d-flex justify-content-between align-items-center w-100">
      <div class="d-flex gap-3">
        <span class="text-muted">Total items: {{ totalCount || 0 }}</span>
        <span class="badge bg-primary" *ngIf="selectedItems.length > 0">
          {{ selectedItems.length }} items selected
        </span>
      </div>
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-secondary" (click)="closeDialog()" [disabled]="isBusy">Cancel</button>
        <button
          type="button"
          class="btn btn-primary"
          (click)="onSave()"
          [disabled]="isBusy || selectedItems.length === 0 || extraFeeValidate">
          <span *ngIf="isBusy" class="spinner-border spinner-border-sm me-1" role="status"></span>
          <i *ngIf="!isBusy" class="bi bi-plus-circle me-1"></i>
          {{ isBusy ? 'Adding...' : 'Add Selected Items' }}
        </button>
      </div>
    </div>
  </ng-template>
</abp-modal>
